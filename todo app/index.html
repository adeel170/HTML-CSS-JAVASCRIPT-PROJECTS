<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="app">
        <header>
            <h1>
                <i class="fas fa-check-circle"></i>
                My Tasks

            </h1>
            <span class="date">Monday,May 5</span>
        </header>
        <div class="input-container">
            <input type="text" placeholder="What do need to do?" class="input">
            <button class="input-btn">+</button>
        </div>
        <div class="filters">
            <button class="filter" id="all">All</button>
            <button class="filter" id="Active">Active</button>
            <button class="filter" id="Completed">Completed</button>
        </div>
        <div class="empty-con">
            <i class="fas fa-clipboard-list"></i>
            <span>No tasks here yet</span>
        </div>
        <ul class="items-container">
            <!-- <li class="item">
                <div class="ld">
                    <input type="checkbox" class="cbBtn">
                    <span>Wash Dishes</span>
                </div>
                <button class="removeItembtn"><i class="fas fa-times"></i></button>
            </li> -->

        </ul>
        <footer>
            <span class="itemsLeft"></span>
            <button class="clr">Clear Completed</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
