<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Pallate Generator</title> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h1>
            Color Pattete Generator
        </h1>
        <button class="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate Pallete
        </button>

        <div class="boxes">
            <!-- Box 1 -->
            <div class="color-box">
                <div class="color" style="background-color: #e1f5fe">

                </div>
                <div class="color-info">
                    <span class="hex-code">#E1F5FE</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>  
        </div>



                    <!-- Box 2 -->
            <div class="color-box">
                <div class="color" style="background-color:#B3E5FC">

                </div>
                <div class="color-info">
                    <span class="hex-code">#B3E5FC</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>  
        </div>




                    <!-- Box 3 -->
            <div class="color-box">
                <div class="color" style="background-color: #81D4FA">

                </div>
                <div class="color-info">
                    <span class="hex-code">#81D4FA</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>  
        </div>




                    <!-- Box 4 -->
            <div class="color-box">
                <div class="color" style="background-color: #4FC3F7">

                </div>
                <div class="color-info">
                    <span class="hex-code">#4FC3F7</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>  
        </div>



                    <!-- Box 5 -->
            <div class="color-box">
                <div class="color" style="background-color: #29B6F6">

                </div>
                <div class="color-info">
                    <span class="hex-code">#29B6F6</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>  
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
