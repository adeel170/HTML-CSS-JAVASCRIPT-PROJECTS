<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ GAME</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <div class="container">
        <div class="screen start-screen active" id="start-screen">
            <!-- Start Screen -->
            <h1>
                Quiz Time!
            </h1>
            <p>
                Test your knowledge with these fun question
            </p>
            <button class="start-quiz pm">Start Quiz</button>

             <!-- Start Screen Ends Here-->
              </div>


             <!-- Quiz Screen -->
              <div class="screen quiz-screen" id="quiz-screen">
                <h2 class="question-statement">Question Statement</h2>
                <div class="quiz-info">
                    
                    <p>
                        Question <span id="current-question">1</span> of <span id="total-questions">5</span>
                    </p>
                    
                    
                    <p>
                        Score <span id="score">0</span>
                    </p>
                
                </div>
                <div class="answers">
                  

                </div>
                <div class="progress">
                    <div class="line">

                    </div>

                </div>
              </div>

              <!-- Result Screen -->

              <div class="screen result-screen" id="result-screen">
                <h1>
                    Quiz Results
                </h1>
                <div class="main">
                    
                    <p class="ss">You Score <spna id="os">2</spna> out of <span id="ts">5</span></p>
                    <p class="msj">Message</p>
                
                </div>

                <button class="restart-btn pm">Restart Quiz</button>


              </div>



        </div>


    
    <script src="script.js"></script>
</body>

</html>
