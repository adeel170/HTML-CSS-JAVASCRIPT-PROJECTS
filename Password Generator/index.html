<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h2>Password Generator</h2>
        <div class="password-container">
            <input type="text" readonly class="password" >
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
        </div>
        <div class="options">
            <!-- password length -->
             <div class="option">
             <label for="password-length">Password Length</label>
             <div class="range-container">
             <input type="range" id="password-length" min="6" max="24" value="12">
             <span class="range-value">12</span>
             </div>
             </div>
        </div>
        <!-- uppercase -->
        <div class="option">
            <label for="uppercase">Include Uppercase</label>
            <input type="checkbox" checked id="uppercase">
        </div>

        <!-- lowercase -->
        <div class="option">
            <label for="lowercase">Include Lowercase</label>
            <input type="checkbox" checked id="lowercase">
        </div>
        <!-- numbers -->
        <div class="option">
            <label for="numbers">Include Numbers</label>
            <input type="checkbox" checked id="numbers">
        </div>
        <!-- Symbols -->
        <div class="option">
            <label for="Symbols">Include Symbols</label>
            <input type="checkbox"checked id="Symbols">
        </div>

        <button class="generate-btn"><i class="fas fa-key"></i>Generate Password</button>

        <div class="remarks">
            <span class="key">Password Strength:</span>
            <span class="value">Strong</span>
        </div>
        <div class="strength-container">
            <div class="strength-bar">
                
            </div>
        </div>

    </div>



    <script src="script.js"></script>
</body>
</html>
